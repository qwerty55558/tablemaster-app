events {
    worker_connections 1024;
}

http {
    # 기본 설정
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 웹소켓 업그레이드를 위한 동적 매핑 (백엔드 WebSocket 전용)
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # 로깅 및 압축
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # 업스트림 정의
    upstream backend {
        server tablemaster-be:8080;
        keepalive 32;
    }

    upstream frontend {
        server tablemaster-fe:3000;
        keepalive 32;
    }

    upstream flutter {
        server tablemaster-app:80;
        keepalive 32;
    }

    # ============================================
    # HTTP → HTTPS 리다이렉트
    # ============================================
    server {
        listen 80;
        server_name clauminirockpt.me api.clauminirockpt.me app.clauminirockpt.me;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ============================================
    # HTTPS - Backend API (WebSocket 지원)
    # ============================================
    server {
        listen 443 ssl;
        server_name api.clauminirockpt.me;

        ssl_certificate /etc/letsencrypt/live/clauminirockpt.me/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/clauminirockpt.me/privkey.pem;
        include /etc/letsencrypt/options-ssl-nginx.conf;

        # WebSocket 엔드포인트
        location /ws {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket 타임아웃 설정
            proxy_connect_timeout 60s;
            proxy_send_timeout 3600s;
            proxy_read_timeout 3600s;
            proxy_buffering off;
        }

        # 일반 API 요청
        location / {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }
    }

    # ============================================
    # HTTPS - Frontend (Next.js)
    # ============================================
    server {
        listen 443 ssl;
        server_name clauminirockpt.me;

        ssl_certificate /etc/letsencrypt/live/clauminirockpt.me/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/clauminirockpt.me/privkey.pem;

        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }
    }

    # ============================================
    # HTTPS - Flutter App
    # ============================================
    server {
        listen 443 ssl;
        server_name app.clauminirockpt.me;

        ssl_certificate /etc/letsencrypt/live/clauminirockpt.me/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/clauminirockpt.me/privkey.pem;

        location / {
            proxy_pass http://flutter;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }
    }
}

