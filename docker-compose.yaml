# ============================================
# TableMaster - GitHub Container Registry 배포용
# ============================================
# 사용법:
#   1. .env 파일에 GITHUB_USERNAME 설정
#   2. docker compose -f docker-compose.ghcr.yml up -d
# ============================================

services:
  # ============================================
  # Frontend (GitHub Container Registry)
  # ============================================
  tablemaster-fe:
    image: ghcr.io/${GITHUB_USERNAME}/tablemaster-fe:${IMAGE_TAG:-latest}
    container_name: tablemaster-fe
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://api.clauminirockpt.tech}
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-wss://api.clauminirockpt.tech/ws}
      - AUTH_SECRET=${AUTH_SECRET:-G+WrXBvvvYpMs5TNVof6weFRS1ICNgsxAj/tLlH90jQ=}
      - AUTH_GOOGLE_ID=${AUTH_GOOGLE_ID:-}
      - AUTH_GOOGLE_SECRET=${AUTH_GOOGLE_SECRET:-}
      - AUTH_KAKAO_ID=${AUTH_KAKAO_ID:-}
      - AUTH_KAKAO_SECRET=${AUTH_KAKAO_SECRET:-}
    networks:
      - tablemaster-network


  # ============================================
  # Flutter App (GitHub Container Registry)
  # ============================================
  tablemaster-app:
    image: ghcr.io/${GITHUB_USERNAME}/tablemaster-app:${IMAGE_TAG:-latest}
    container_name: tablemaster-app
    ports:
      - "5000:80"
    restart: unless-stopped
    networks:
      - tablemaster-network
    environment:
      - TZ=Asia/Seoul
      - AUTH_SECRET=${AUTH_SECRET:-G+WrXBvvvYpMs5TNVof6weFRS1ICNgsxAj/tLlH90jQ=}

  # ============================================
  # Backend (GitHub Container Registry)
  # ============================================
  tablemaster-be:
    image: ghcr.io/${GITHUB_USERNAME}/tablemaster-be:${IMAGE_TAG:-latest}
    container_name: tablemaster-be
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-prod}
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USER=${RABBITMQ_USER}
      - RABBITMQ_PASS=${RABBITMQ_PASS}
      - JWT_SECRET=${JWT_SECRET}
      - DEVICE_APP_SECRET=${DEVICE_APP_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - tablemaster-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # ============================================
  # PostgreSQL Database
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres-data:/var/lib/postgresql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - tablemaster-network
    restart: unless-stopped

  # ============================================
  # Redis Cache
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: redis
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tablemaster-network
    restart: unless-stopped

  # ============================================
  # RabbitMQ Message Broker
  # ============================================
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rabbitmq
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - tablemaster-network
    restart: unless-stopped

  # ============================================
  # Nginx Reverse Proxy
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./data/certbot/conf:/etc/letsencrypt:ro
      - ./data/certbot/www:/var/www/certbot:ro
    depends_on:
      tablemaster-fe:
        condition: service_started
      tablemaster-be:
        condition: service_healthy
      tablemaster-app:
        condition: service_started
    networks:
      - tablemaster-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===========================================
  # Certbot
  # ===========================================
  certbot:
    image: certbot/certbot
    volumes:
      - ./data/certbot/conf:/etc/letsencrypt
      - ./data/certbot/www:/var/www/certbot
    command: certonly --webroot -w /var/www/certbot \
      -d clauminirockpt.tech \
      -d api.clauminirockpt.tech \
      -d app.clauminirockpt.tech \
      --email amajang2012@gmail.com --agree-tos --non-interactive
    networks:
      - tablemaster-network

# ============================================
# Networks
# ============================================
networks:
  tablemaster-network:
    driver: bridge
    name: tablemaster-network

# ============================================
# Volumes
# ============================================
volumes:
  postgres-data:
    name: tablemaster-postgres-data
  redis-data:
    name: tablemaster-redis-data
  rabbitmq-data:
    name: tablemaster-rabbitmq-data



